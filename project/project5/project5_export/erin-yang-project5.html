<script type="application/shiny-prerendered" data-context="server-start">
# ==================================================================
# packages

library(tidyverse)     # ecosystem of data science packages
library(leaflet)       # web interactive maps
library(sf)            # "simple features" (vector data for maps)
library(plotly)        # web interactive plots
library(ggiraph)       # make ggplots into interactive plots
library(RColorBrewer)  # optional: nice color schemes


# ==================================================================
# import crash data, and mutate auxiliary columns for your analysis
# ==================================================================

</script>
 
<script type="application/shiny-prerendered" data-context="server">
# assemble leaflet map of crash locations (tab 1)

output$map <- renderLeaflet({

  req(input$coltype)

  filtered <- crashes |>
    filter(
      DATETIME >= input$dates[1],
      DATETIME <= input$dates[2],
      COUNTY == input$county,
      PCF_VIOL_CATEGORY == input$violation,
      TYPE_OF_COLLISION %in% input$coltype
    )

  leafmap <- leaflet(filtered) |>
    addProviderTiles(input$provider)

  if (input$color == "yes") {
    pal <- colorFactor(
    palette = "Reds",   
    domain = filtered$COLLISION_SEVERITY,
    ordered = TRUE
   )
    
    leafmap |>
      addCircles(
        lng = ~POINT_X,
        lat = ~POINT_Y,
        label = ~paste0("Case ID:", CASE_ID, ", ", PCF_VIOL_CATEGORY),
        color = ~pal(COLLISION_SEVERITY),
        weight = 2
      ) |>
      addLegend(
        position = "bottomright",
        pal = pal,
        values = ~COLLISION_SEVERITY,
        title = "Severity"
      )

  } 
  else {

    leafmap |>
      addCircles(
        lng = ~POINT_X,
        lat = ~POINT_Y,
        label = ~paste0("Case ID:", CASE_ID, ", ", PCF_VIOL_CATEGORY),
        weight = 2
      )
  }
})
  


# assemble graphic for tab 2
output$plot <- renderPlotly({
  filtered2 <- crashes |>
    filter((WDAY == input$wday), 
      DATETIME >= input$dates[1],
      DATETIME <= input$dates[2],
      COUNTY == input$county,
      PCF_VIOL_CATEGORY == input$violation,
      TYPE_OF_COLLISION %in% input$coltype) |>
        group_by(TYPE_OF_COLLISION) |>
           summarize(count = n())
g <- filtered2 |> ggplot(aes(y = count, x = TYPE_OF_COLLISION)) +
  geom_col() +
  labs(
    title = "Number and Type of Crashes by Day of Week", 
          x = "Type of Collision", 
          y = "Number of Crashes")
  ggplotly(g)

})

</script>
 
<script type="application/shiny-prerendered" data-context="server-extras">
ojs_define <- function(..., .session = shiny::getDefaultReactiveDomain()) {
  quos <- rlang::enquos(...)
  vars <- rlang::list2(...)
  nm <- names(vars)
  if (is.null(nm)) {
    nm <- rep_len("", length(vars))
  }
  mapply(
    function(q, nm, val) {
      # Infer name, if possible
      if (nm == "") {
        tryCatch(
          {
            nm <- rlang::as_name(q)
          },
          error = function(e) {
            code <- paste(collapse = "\n", deparse(rlang::f_rhs(q)))
            stop(
              "ojs_define() could not create a name for the argument: ",
              code
            )
          }
        )
      }
      .session$output[[nm]] <- val
      outputOptions(.session$output, nm, suspendWhenHidden = FALSE)
      .session$sendCustomMessage("ojs-export", list(name = nm))
      NULL
    },
    quos,
    nm,
    vars,
    SIMPLIFY = FALSE,
    USE.NAMES = FALSE
  )
  invisible()
}
</script>

        const selectCodeLines = (annoteEl) => {

          const annoteSpan = window.document.querySelector(selectorForAnnotation(targetCell, targetAnnotation));

          if (lineIds.length > 0) {
              //compute the position of the single el (top and bottom and make a div)
              const el = window.document.getElementById(lineIds[0]);
              top = el.offsetTop;
              height = el.offsetHeight;
              parent = el.parentElement.parentElement;
            if (lineIds.length > 1) {
              const lastEl = window.document.getElementById(lineIds[lineIds.length - 1]);
              const bottom = lastEl.offsetTop + lastEl.offsetHeight;
              height = bottom - top;
            }
            if (top !== null && height !== null && parent !== null) {

              let div = window.document.getElementById("code-annotation-line-highlight");
              if (div === null) {
                div = window.document.createElement("div");
                div.setAttribute("id", "code-annotation-line-highlight");
                div.style.position = 'absolute';
                parent.appendChild(div);
              }
              div.style.top = top - 2 + "px";
              div.style.height = height + 4 + "px";
              div.style.left = 0;
              let gutterDiv = window.document.getElementById("code-annotation-line-highlight-gutter");
              if (gutterDiv === null) {

          const elementsIds = ["code-annotation-line-highlight", "code-annotation-line-highlight-gutter"];
          elementsIds.forEach((elId) => {

      function throttle(fn, ms) {
      let throttle = false;
      let timer;
        return (...args) => {
          if(!throttle) { // first call gets through
              fn.apply(this, args);
              throttle = true;
          } else { // all the others get throttled
              if(timer) clearTimeout(timer); // cancel #2
              timer = setTimeout(() => {
                fn.apply(this, args);
                timer = throttle = false;
              }, ms);
          }
        };
      }

        for (const annoteDlNode of annoteDls) {

              selectCodeLines(clickedEl);
              clickedEl.classList.add('code-annotation-active');
